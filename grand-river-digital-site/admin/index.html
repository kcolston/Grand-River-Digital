<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCraft &mdash; Admin Login</title>
<meta name="robots" content="noindex, nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:16px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(0,0,0,.08)}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:34px;height:34px;background:#1a56db;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px;fill:#fff}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.2px;color:#111827}
.logo-text span{color:#1a56db}
.sub{font-size:12.5px;color:#6b7280;margin-bottom:28px;margin-top:6px;line-height:1.5;padding-left:44px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.3px;text-transform:uppercase}
input{padding:11px 14px;border:1px solid #e5e7eb;border-radius:9px;font-size:14px;outline:none;transition:border .15s,box-shadow .15s;width:100%;font-family:inherit;color:#111827}
input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.btn{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:6px}
.btn:hover{background:#1d4ed8}
.err{font-size:12px;color:#dc2626;margin-top:10px;display:none;padding:9px 12px;background:rgba(220,38,38,.06);border-radius:7px;border:1px solid rgba(220,38,38,.15)}
.divider{border:none;border-top:1px solid #f3f4f6;margin:20px 0}
.hint{font-size:11px;color:#9ca3af;text-align:center;line-height:1.6}
/* Change password panel */
.change-pw{display:none}
.panel-title{font-size:15px;font-weight:600;color:#111827;margin-bottom:4px}
.panel-sub{font-size:12.5px;color:#6b7280;margin-bottom:20px;line-height:1.5}
.first-login-badge{display:inline-block;background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;margin-bottom:16px;border:1px solid #fde68a}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
    <div class="logo-text">WebCraft <span>Agency</span></div>
  </div>
  <div class="sub">Agency Dashboard &mdash; owner access only</div>

  <!-- LOGIN PANEL -->
  <div id="loginPanel">
    <div class="field">
      <label for="em">Email</label>
      <input type="email" id="em" placeholder="you@youremail.com" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Sign in to Dashboard &rarr;</button>
    <div class="err" id="err">Incorrect email or password &mdash; try again.</div>
    <hr class="divider">
    <div class="hint">This page is not linked on the public site.<br>Bookmark it after signing in.</div>
  </div>

  <!-- FORCE CHANGE PASSWORD PANEL -->
  <div id="changePwPanel" class="change-pw">
    <div class="first-login-badge">&#128274; First login detected</div>
    <div class="panel-title">Set your password</div>
    <div class="panel-sub">For security, please set a new password and confirm your email before continuing.</div>
    <div class="field">
      <label for="newEmail">Your email</label>
      <input type="email" id="newEmail" placeholder="you@youremail.com">
    </div>
    <div class="field">
      <label for="newPw">New password</label>
      <input type="password" id="newPw" placeholder="At least 8 characters">
    </div>
    <div class="field">
      <label for="confirmPw">Confirm password</label>
      <input type="password" id="confirmPw" placeholder="Repeat new password" onkeydown="if(event.key==='Enter')saveNewCreds()">
    </div>
    <button class="btn" onclick="saveNewCreds()">Save &amp; Enter Dashboard &rarr;</button>
    <div class="err" id="err2"></div>
  </div>
</div>

<script>
// Stored credentials — start with defaults, overridden by localStorage
const DEFAULT_HASH  = '18bbbec8bd46ee18b107b185aaea73ef6e0c8e7db524f821d1b3c96d51c8a03a';
const DEFAULT_EMAIL = 'admin'; // accepts any email on first login

function getCreds() {
  try {
    const raw = localStorage.getItem('grd_owner_creds');
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return { email: DEFAULT_EMAIL, hash: DEFAULT_HASH, isDefault: true };
}

function saveCreds(email, hash) {
  localStorage.setItem('grd_owner_creds', JSON.stringify({ email, hash, isDefault: false }));
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const email = document.getElementById('em').value.trim().toLowerCase();
  const pw    = document.getElementById('pw').value;
  if (!email || !pw) { showErr('err','Please enter your email and password.'); return; }

  const creds = getCreds();
  const hash  = await sha256(pw);

  // Accept if: hash matches AND (email matches OR still using default creds)
  const emailOk = creds.isDefault || email === creds.email.toLowerCase();
  const passOk  = hash === creds.hash;

  if (emailOk && passOk) {
    // Check if first login — force password change
    if (creds.isDefault) {
      document.getElementById('loginPanel').style.display    = 'none';
      document.getElementById('changePwPanel').style.display = 'block';
      // Pre-fill email if they typed one
      if (email !== 'admin') document.getElementById('newEmail').value = email;
    } else {
      // Normal login — set session and go
      sessionStorage.setItem('grd_admin', hash);
      sessionStorage.setItem('grd_owner_email', creds.email);
      window.location.href = 'dashboard.html';
    }
  } else {
    showErr('err', 'Incorrect email or password &mdash; try again.');
  }
}

async function saveNewCreds() {
  const email   = document.getElementById('newEmail').value.trim();
  const pw      = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;

  if (!email || !email.includes('@')) { showErr('err2','Please enter a valid email.'); return; }
  if (pw.length < 8)                  { showErr('err2','Password must be at least 8 characters.'); return; }
  if (pw !== confirm)                 { showErr('err2','Passwords do not match.'); return; }

  const hash = await sha256(pw);
  saveCreds(email.toLowerCase(), hash);
  sessionStorage.setItem('grd_admin', hash);
  sessionStorage.setItem('grd_owner_email', email.toLowerCase());
  window.location.href = 'dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.innerHTML = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// Skip gate if already authenticated this session
(async () => {
  const creds   = getCreds();
  const stored  = sessionStorage.getItem('grd_admin');
  if (stored && stored === creds.hash && !creds.isDefault) {
    window.location.href = 'dashboard.html';
  }
})();
</script>
</body>
</html>
