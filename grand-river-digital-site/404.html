<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found &mdash; Grand River Digital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.wrap{max-width:440px}
.num{font-size:96px;font-weight:800;color:#1a56db;line-height:1;letter-spacing:-4px;margin-bottom:16px}
.rule{width:60px;height:3px;background:#f59e0b;border-radius:99px;margin:0 auto 20px}
h1{font-size:22px;font-weight:600;color:#fff;margin-bottom:10px}
p{font-size:14px;color:#6b7280;line-height:1.7;margin-bottom:28px}
a{display:inline-block;padding:12px 26px;background:#1a56db;color:#fff;border-radius:9px;text-decoration:none;font-size:14px;font-weight:600;transition:background .15s}
a:hover{background:#1d4ed8}
.brand{font-size:12px;color:#374151;margin-top:32px;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <div class="rule"></div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have moved.<br>Head back to the homepage to find what you need.</p>
  <a href="/">Back to Grand River Digital &rarr;</a>
  <div class="brand">GRAND RIVER DIGITAL &nbsp;&bull;&nbsp; Sterling Heights, MI</div>
</div>
</body>
</html>
